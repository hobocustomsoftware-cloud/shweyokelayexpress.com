name: Deploy Laravel API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # ဤနေရာတွင် v4 သည် နောက်ဆုံး version ဖြစ်နေပါက ဆက်သုံးနိုင်သည်

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node version ကို 24 သို့ ပြောင်းလိုက်ပါ

      - name: Build Assets
        # Node.js 24 ဖြစ်သွားတဲ့အတွက် crypto error မျိုး လုံးဝတက်မှာ မဟုတ်တော့ပါဘူး
        run: |
          npm install
          npm run build

      - name: Upload Build Assets to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build"
          target: "/home/shweyoke/testing.shweyokelayexpress.com/public"
          strip_components: 1

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/shweyoke/testing.shweyokelayexpress.com
            git pull origin main
            
            mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache storage/logs
            chmod -R 775 storage bootstrap/cache
            
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
